# =============================================================================
# compose.yaml — SUSE AI Podman Compose Stack
# =============================================================================
# Usage (Podman 5.x built-in compose — NOT docker-compose):
#   podman compose up -d                     start all services
#   podman compose up -d --build             rebuild images first
#   podman compose --profile embeddings up -d  also start embed service
#   podman compose logs -f                   live logs (all services)
#
# NOTES for Podman 5.x on openSUSE Leap 16:
#   - container_name: NOT recommended (Podman generates predictable names)
#   - userns_mode: keep-id maps your UID into the container (rootless must-have)
#   - Volume mounts need :z (SELinux shared label) — required on Leap 16
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # LLM Service
  # ---------------------------------------------------------------------------
  llm:
    image: docker.io/ollama/ollama:latest
    volumes:
      - llm-models:/root/.ollama:z
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    userns_mode: keep-id
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"
        reservations:
          memory: 4G
          cpus: "2"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Application Service
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: deploy/podman/Containerfile
    ports:
      - "8090:8090"
    volumes:
      - app-data:/data:z
      - app-config:/app/config:z
      - app-logs:/app/logs:z   # FIX: Named volume prevents root-ownership bugs
    environment:
      - PODMAN_USERNS=keep-id
      - LLM_BASE_URL=http://llm:11434
      - EMBED_BASE_URL=http://embed:11435
      - APP_HOST=0.0.0.0
      - APP_PORT=8090
      - LOG_LEVEL=info
    userns_mode: keep-id
    depends_on:
      llm:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "2"
        reservations:
          memory: 1G
          cpus: "1"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Embedding Service — Optional
  # ---------------------------------------------------------------------------
  embed:
    image: docker.io/ollama/ollama:latest
    profiles:
      - embeddings
    volumes:
      - embed-models:/root/.ollama:z
    ports:
      - "11435:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    userns_mode: keep-id
    entrypoint:
      - "/bin/sh"
      - "-c"
      - >-
        ollama serve &
        sleep 5 &&
        ollama pull nomic-embed-text &&
        wait
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
        reservations:
          memory: 2G
          cpus: "1"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 3
    restart: unless-stopped

# =============================================================================
# Volumes
# =============================================================================
volumes:
  llm-models:
    driver: local
  app-data:
    driver: local
  app-config:
    driver: local
  app-logs:
    driver: local
  embed-models:
    driver: local

networks:
  default:
    driver: bridge
